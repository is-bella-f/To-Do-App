<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"> <!----This is to help for accessibility across browsers-->
        <meta name="viewport" content="width=device-width, initial-scale=1"> <!--This ensures it's mobile friendly---->
        <title>To Do App</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body class="min-vh-100 bg-body-secondary d-flex justify-content-center"> <!---min-vh-100 is a CSS utility class that sets an elements min height to 100% of the device-->
        <div class="container my-5">
            <!---CREATE A TASK FORM--->
            <h2 class="mb-3 text-primary">Create a task</h2>
            <form id="newTaskForm" class="bg-body-secondary p-3 bg-light-subtle rounded">
                <div class="d-flex gap-3 flex-wrap">
                    <div class="form-group flex-grow-1">
                        <label for="title" class="form-label text-primary">Title</label>
                        <input type="text" id="title" name="title" 
                        class="form-control" placeholder="Vaccum" required>
                    </div>
                    <div class="form-group">
                        <label for="dueDate" class="form-label text-primary">Due Date</label>
                        <input type="date" name="dueDate" id="dueDate" class="form-control" required>
                    </div>
                    <div class="align-self-end">
                        <button type="submit" class="btn btn-success">Create Task</button>
                    </div>
                </div>
            </form>
            <div class="d-flex gap-3 align-items-center mt-4" id="filterBar">
                <label class="text-primary">Filter by:</label>
                <select id="taskFilter" class="form-select form-select-sm w-auto">
                    <option value="all">All Tasks</option>
                    <option value="false">Incomplete</option>
                    <option value="true">Completed</option>
                    <option value="all">Due today</option>
                    <option value="all">Due this week</option>
                </select>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="sortDueDate">
                    <label class="form-check-label text-primary" for="sortDueDate">Sort by Due Date</label>
                </div>
            </div>

            <!---TO DO: Create a loop that list my tasks in a table format-->
            <div class="table-responsive mt-3">
                <table class="table table-hover table-light">
                    <thead>
                        <th scope="col" class="form-label text-primary">Task</th>
                        <th scope="col" class="form-label text-primary">Due Date</th>
                        <th scope="col" class="form-label text-primary text-end">Actions</th>
                    </thead>
                    <tbody id="toDoList">

                    </tbody>
                </table>
            </div>
           <div>
            <!---EDIT TASK MODAL--->
            <div class="modal fade" id="editModal">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title text-primary">Edit Task</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                            <div class="modal-body">
                                <label for="editTitle" class="form-label text-primary">Title</label>
                                <input id="editTitle" class="form-control mb-2" placeholder="Title"/>
                                <label for="editDueDate" class="form-label text-primary">Due Date</label>
                                <input id="editDueDate" class="form-control" type="date"/>
                            </div>
                            <div class="modal-footer">
                                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <button class="btn btn-primary" onclick="editTask()">Save Changes</button>
                            </div>
                    </div>
                </div>
            </div>
            <script src="./js/script.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
